<!DOCTYPE html>
<html>
<head>
  <title>HRMS Auth Test</title>
  <style>
    body { font-family: monospace; padding: 40px; background: #1a1a2e; color: #eee; }
    button { padding: 12px 24px; background: #4285f4; color: white; border: none; 
             border-radius: 6px; cursor: pointer; font-size: 16px; margin: 8px 0; }
    pre { background: #16213e; padding: 20px; border-radius: 8px; 
          overflow-x: auto; white-space: pre-wrap; }
    h2 { color: #4fc3f7; }
    .success { color: #81c784; }
    .error { color: #e57373; }
  </style>
</head>
<body>

<h2>HRMS Auth Tester</h2>

<!-- STEP 1: Put your exact values here -->
<script>
  const GOOGLE_CLIENT_ID = "638894079470-iru1ek4qd4rfg3gscm2d6p029croo8ji.apps.googleusercontent.com";
  const REDIRECT_URI     = "http://localhost:5500/test_auth.html";
  const API_BASE         = "http://localhost:8000/api/v1";
</script>

<div id="step1">
  <h3>Step 1 — Login with Google</h3>
  <button onclick="startGoogleLogin()">Sign in with Google</button>
</div>

<div id="step2" style="display:none">
  <h3>Step 2 — Exchange code with our backend</h3>
  <p>Code received from Google: <span id="code-display" class="success"></span></p>
  <button onclick="exchangeCode()">Call POST /auth/login</button>
</div>

<div id="step3" style="display:none">
  <h3>Step 3 — Test GET /auth/me with access token</h3>
  <button onclick="testMe()">Call GET /auth/me</button>
</div>

<h3>Response:</h3>
<pre id="output">Waiting...</pre>

<script>
  let capturedCode = null;
  let accessToken = null;
  let refreshToken = null;

  function startGoogleLogin() {
    const params = new URLSearchParams({
      client_id: GOOGLE_CLIENT_ID,
      redirect_uri: REDIRECT_URI,
      response_type: "code",
      scope: "openid email profile",
      access_type: "offline",
      prompt: "consent",
    });
    window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
  }

  // On page load — check if Google redirected back with a code
  window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (code) {
      capturedCode = code;
      document.getElementById("step1").style.display = "none";
      document.getElementById("step2").style.display = "block";
      document.getElementById("code-display").textContent = code.substring(0, 30) + "...";
      document.getElementById("output").textContent = "Code captured! Click the button above to exchange it.";
    }
  };

  async function exchangeCode() {
    document.getElementById("output").textContent = "Calling POST /auth/login...";
    try {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code: capturedCode }),
      });
      const data = await res.json();
      document.getElementById("output").textContent = JSON.stringify(data, null, 2);

      if (data.access_token) {
        accessToken = data.access_token;
        refreshToken = data.refresh_token;
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "block";
      }
    } catch (err) {
      document.getElementById("output").textContent = "ERROR: " + err.message;
    }
  }

  async function testMe() {
    document.getElementById("output").textContent = "Calling GET /auth/me...";
    try {
      const res = await fetch(`${API_BASE}/auth/me`, {
        headers: { "Authorization": `Bearer ${accessToken}` },
      });
      const data = await res.json();
      document.getElementById("output").textContent = JSON.stringify(data, null, 2);
    } catch (err) {
      document.getElementById("output").textContent = "ERROR: " + err.message;
    }
  }
</script>

</body>
</html>
